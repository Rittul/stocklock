services:

  postgres:
    image: postgres:16

    container_name: stocklock-postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:latest

    container_name: stocklock-redis

    ports:
      - "6379:6379"


  backend:
    build: ./backend

    container_name: stocklock-backend

    ports:
      - "5000:5000"

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public

    depends_on:
      - postgres
      - redis

    volumes:
      - ./backend:/app
      - /app/node_modules


  frontend:
    build: ./frontend

    container_name: stocklock-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules


volumes:
  postgres_data: